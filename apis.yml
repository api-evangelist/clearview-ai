aid: clearview-ai
name: Clearview AI
description: >-
  Clearview AI is a U.S.-based facial recognition company providing
  identity verification, investigative search, and biometric matching
  services primarily to law enforcement, government agencies, and
  approved financial sector customers. The platform indexes publicly
  available images and exposes proprietary facial recognition
  technology through a controlled, customer-vetted developer surface.
  Public technical documentation of the API is intentionally limited;
  access is gated, and integrations are scoped through customer
  agreements with strict use-case, audit, and transparency
  requirements.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
url: https://raw.githubusercontent.com/api-evangelist/clearview-ai/refs/heads/main/apis.yml
