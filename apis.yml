apis:
  - aid: clearview-ai:facial-recognition
    name: Clearview AI Facial Recognition Platform
    tags:
      - Biometrics
      - Facial Recognition
      - Identity Verification
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://www.clearview.ai/
    properties:
      - url: https://www.clearview.ai/
        type: Website
      - url: https://www.clearview.ai/post/transparency-report
        type: Transparency
    description: >-
      The Clearview AI facial recognition platform provides image-based
      identity matching backed by an indexed corpus of publicly
      available imagery. Access is restricted to vetted government,
      law enforcement, and financial-services customers under
      contractual use-case constraints. Technical integration details
      are not publicly documented; customers receive credentials,
      endpoints, and reference material directly from Clearview AI
      after onboarding.
  - aid: clearview-ai:investigation-tools
    name: Clearview AI Investigation Tools
    tags:
      - Investigations
      - Law Enforcement
      - Search
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://www.clearview.ai/law-enforcement
    properties:
      - url: https://www.clearview.ai/law-enforcement
        type: Documentation
    description: >-
      Clearview AI offers investigation tooling for vetted law
      enforcement and public-safety users that surfaces matching
      imagery and source links for an uploaded probe image. Workflow
      tooling is delivered through a hosted user interface; programmatic
      access, when granted, is governed by separate customer agreements.
  - aid: clearview-ai:financial-services
    name: Clearview AI Financial Services
    tags:
      - Financial Services
      - Identity Verification
      - KYC
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://www.clearview.ai/
    properties:
      - url: https://www.clearview.ai/
        type: Documentation
    description: >-
      Clearview AI markets identity-verification capabilities to
      regulated financial-services customers for fraud prevention,
      KYC enrichment, and investigative review. Integration is
      delivered as a vendor-managed service with contractual
      controls; public API documentation is not provided.
